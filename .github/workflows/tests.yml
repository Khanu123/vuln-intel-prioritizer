name: tests

on:
  push:
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: PYTHONPATH=src python -m unittest discover -s tests -v
      - run: PYTHONPATH=src python -m vuln_intel_prioritizer.cli --out docs/examples/example_vulnerability_priorities.md --json docs/examples/example_vulnerability_priorities.json
